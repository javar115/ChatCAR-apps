const SUPABASE_URL = "https://qgurtsdfirfurklmliah.supabase.co";

const { useState, useEffect, useMemo, useCallback } = React;

// ── constantes ────────────────────────────────────────────────────────────────
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const EXPENSE_TYPES = {
  Propiedades: ["Luz","Agua","Gas","Expensas","Alquileres","Otros"],
  Vehículos:   ["Patentes","Seguros","Combustible","Otros"],
  Familiares:  ["Alimentación y limpieza","Salud","Educación","Ocio","Otros"],

const GROUP_ICONS  = { Propiedades:"🏠", Vehículos:"🚗", Familiares:"👨‍👩‍👧" };
const GROUP_COLORS = {
  Propiedades: { bg:"#0e1f0e", accent:"#4ade80", border:"#1a3a1a" },
  Vehículos:   { bg:"#0e0e1f", accent:"#818cf8", border:"#1a1a3a" },
  Familiares:  { bg:"#1f0e0e", accent:"#fb923c", border:"#3a1a1a" },
};

// ── helpers ───────────────────────────────────────────────────────────────────
const fmt      = n  => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS"}).format(n||0);
const fmtDate  = d  => d ? new Date(d+"T00:00:00").toLocaleDateString("es-AR") : "—";
const today    = () => new Date().toISOString().slice(0,10);
const mesISO   = (y,m) => `${y}-${String(m).padStart(2,"0")}`;
const mesActual= () => { const n=new Date(); return mesISO(n.getFullYear(), n.getMonth()+1); };
const labelMes = iso => { if(!iso) return ""; const [y,m]=iso.split("-"); return `${MONTHS[+m-1]} ${y}`; };

// ── estilos ───────────────────────────────────────────────────────────────────
const S = {
  root:        { display:"flex", height:"100vh", fontFamily:"'DM Sans',system-ui,sans-serif", color:"#e5e7eb", background:"#0f1117", overflow:"hidden" },
  sidebar:     { width:220, background:"#111827", borderRight:"1px solid #1f2937", display:"flex", flexDirection:"column", padding:"20px 10px", gap:2, flexShrink:0, overflowY:"auto" },
  logo:        { display:"flex", alignItems:"center", gap:10, padding:"0 10px 20px" },
  logoMark:    { width:34, height:34, borderRadius:8, background:"#cc0000", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:800, fontSize:14, flexShrink:0 },
  main:        { flex:1, display:"flex", flexDirection:"column", overflow:"hidden" },
  topbar:      { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 24px", borderBottom:"1px solid #1f2937", background:"#111827", flexShrink:0 },
  content:     { flex:1, padding:24, overflowY:"auto", animation:"fadeIn 0.2s ease" },
  card:        { background:"#111827", border:"1px solid #1f2937", borderRadius:14 },
  input:       { width:"100%", background:"#0a0d14", border:"1px solid #374151", borderRadius:8, padding:"9px 12px", color:"#e5e7eb", fontSize:14, outline:"none", fontFamily:"inherit" },
  select:      { width:"100%", background:"#0a0d14", border:"1px solid #374151", borderRadius:8, padding:"9px 12px", color:"#e5e7eb", fontSize:14, outline:"none", fontFamily:"inherit", cursor:"pointer" },
  label:       { display:"block", color:"#6b7280", fontSize:11, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em", fontWeight:600 },
  btnPrimary:  { background:"#cc0000", color:"#fff", border:"none", borderRadius:8, padding:"9px 18px", fontWeight:700, cursor:"pointer", fontSize:14, fontFamily:"inherit" },
  btnOutline:  { background:"transparent", color:"#9ca3af", border:"1px solid #374151", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:13, fontFamily:"inherit" },
  btnDanger:   { background:"#1f0808", color:"#fca5a5", border:"1px solid #7f1d1d", borderRadius:8, padding:"7px 12px", cursor:"pointer", fontSize:13, fontFamily:"inherit" },
  btnSuccess:  { background:"#052e16", color:"#4ade80", border:"1px solid #166534", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"inherit" },
  btnWarning:  { background:"#1c0d00", color:"#fb923c", border:"1px solid #78350f", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"inherit" },
  btnGhost:    { background:"#1f2937", color:"#9ca3af", border:"none", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:13, fontFamily:"inherit" },
  badge:       { padding:"2px 8px", borderRadius:999, fontSize:11, fontWeight:700 },
  overlay:     { position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:16, backdropFilter:"blur(4px)" },
  modalBox:    { background:"#111827", border:"1px solid #1f2937", borderRadius:16, width:"100%", maxWidth:480, maxHeight:"92vh", display:"flex", flexDirection:"column", animation:"slideUp 0.2s ease" },
  toast:       { position:"fixed", bottom:24, right:24, borderRadius:10, padding:"12px 20px", fontSize:14, fontWeight:600, zIndex:200, animation:"fadeIn 0.2s ease" },
  progressTrack:{ background:"#1f2937", borderRadius:999, height:8, overflow:"hidden" },
  progressBar:  { height:"100%", borderRadius:999, transition:"width 0.6s ease" },
  sectionTitle: { color:"#6b7280", fontSize:11, textTransform:"uppercase", letterSpacing:"0.08em", fontWeight:700, marginBottom:10 },
  tabBar:      { display:"flex", gap:4, background:"#0a0d14", borderRadius:10, padding:4, marginBottom:16 },
  tab:         { flex:1, padding:"8px 0", borderRadius:7, border:"none", cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:"inherit", transition:"all 0.15s" },
};

// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const [data, setData]       = useState({ budgets:[], properties:[], vehicles:[], expenses:[] });
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(false);
  const [view, setView]       = useState("dashboard");
  const [modal, setModal]     = useState(null);
  const [toast, setToast]     = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const isMobile = window.innerWidth < 700;
  const hoy = mesActual();

  const showToast = useCallback((msg, ok=true) => {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 3500);
  }, []);

  const reload = useCallback(async (table) => {
    const asc = table !== "expenses";
    const col  = table === "expenses" ? "date" : "created_at";
    const { data:rows, error } = await db.from(table).select("*").order(col,{ascending:asc});
    if (!error) setData(prev => ({...prev,[table]:rows||[]}));
  }, []);

  const reloadAll = useCallback(async () => {
    setLoading(true);
    try {
      const [b,p,v,e] = await Promise.all([
        db.from("budgets").select("*").order("year").order("month"),
        db.from("properties").select("*").order("created_at"),
        db.from("vehicles").select("*").order("created_at"),
        db.from("expenses").select("*").order("date",{ascending:false}),
      ]);
      if (b.error||p.error||v.error||e.error) throw new Error("DB error");
      setData({ budgets:b.data||[], properties:p.data||[], vehicles:v.data||[], expenses:e.data||[] });
      setDbError(false);
    } catch { setDbError(true); }
    finally  { setLoading(false); }
  }, []);

  useEffect(() => { reloadAll(); }, [reloadAll]);

  // presupuesto del mes actual
  const activeBudget = useMemo(() => {
    const now = new Date();
    return data.budgets.find(b => b.year===now.getFullYear() && b.month===now.getMonth()+1) || null;
  }, [data.budgets]);

  // gastos del mes actual
  const gastosMesActual = useMemo(() =>
    data.expenses.filter(e => (e.mes_origen||e.date?.slice(0,7)) === hoy)
  , [data.expenses, hoy]);

  // pendientes de meses anteriores
  const pendientesAnteriores = useMemo(() =>
    data.expenses.filter(e => {
      const mes = e.mes_origen || e.date?.slice(0,7);
      return e.status === "pending" && mes < hoy;
    })
  , [data.expenses, hoy]);

  // gastos archivados (pagados de meses anteriores)
  const archivados = useMemo(() =>
    data.expenses.filter(e => {
      const mes = e.mes_origen || e.date?.slice(0,7);
      return e.status === "paid" && mes < hoy;
    })
  , [data.expenses, hoy]);

  // consumido = pagados del mes + pendientes anteriores
  const consumed = useMemo(() => {
    const pagadosMes = gastosMesActual.filter(e=>e.status==="paid").reduce((s,e)=>s+parseFloat(e.paid_amount??e.amount),0);
    const pendAnt    = pendientesAnteriores.reduce((s,e)=>s+parseFloat(e.amount),0);
    const pendMes    = gastosMesActual.filter(e=>e.status==="pending").reduce((s,e)=>s+parseFloat(e.amount),0);
    return pagadosMes + pendAnt + pendMes;
  }, [gastosMesActual, pendientesAnteriores]);

  const pct = activeBudget ? Math.min(100,(consumed/activeBudget.total)*100) : 0;

  if (loading) return <Loader/>;
  if (dbError)  return <DBError onRetry={reloadAll}/>;

  const ctx = { data, reload, setModal, showToast, hoy, gastosMesActual, pendientesAnteriores, archivados };

  const views = {
    dashboard:  <Dashboard {...ctx} activeBudget={activeBudget} consumed={consumed} pct={pct} setView={setView}/>,
    properties: <Entities type="properties" {...ctx}/>,
    vehicles:   <Entities type="vehicles"   {...ctx}/>,
    expenses:   <ExpenseList {...ctx}/>,
    archivo:    <Archivo archivados={archivados} pendientesAnteriores={pendientesAnteriores} reload={reload} setModal={setModal} showToast={showToast}/>,
    reports:    <Reports data={data}/>,
  };

  return (
    <div style={S.root}>
      {!isMobile && <Sidebar view={view} setView={setView}/>}
      <main style={S.main}>
        <TopBar view={view} setModal={setModal} isMobile={isMobile} menuOpen={menuOpen} setMenuOpen={setMenuOpen} hoy={hoy}/>
        {isMobile && menuOpen && (
          <div style={{position:"fixed",inset:0,zIndex:90}} onClick={()=>setMenuOpen(false)}>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:220,background:"#111827",borderRight:"1px solid #1f2937",zIndex:91}} onClick={e=>e.stopPropagation()}>
              <Sidebar view={view} setView={v=>{setView(v);setMenuOpen(false);}}/>
            </div>
          </div>
        )}
        <div style={S.content}>{views[view]}</div>
      </main>

      {modal?.type==="budget"        && <BudgetModal      data={data} reload={reload} close={()=>setModal(null)} showToast={showToast}/>}
      {modal?.type==="property"      && <EntityModal      type="properties" reload={reload} close={()=>setModal(null)} showToast={showToast} item={modal.item}/>}
      {modal?.type==="vehicle"       && <EntityModal      type="vehicles"   reload={reload} close={()=>setModal(null)} showToast={showToast} item={modal.item}/>}
      {modal?.type==="expense"       && <ExpenseModal     data={data} reload={reload} close={()=>setModal(null)} showToast={showToast} item={modal.item} hoy={hoy}/>}
      {modal?.type==="payPending"    && <PayPendingModal  expense={modal.expense} reload={reload} close={()=>setModal(null)} showToast={showToast}/>}
      {modal?.type==="deleteConfirm" && <DeleteConfirmModal expense={modal.expense} reload={reload} close={()=>setModal(null)} showToast={showToast}/>}

      {toast && (
        <div style={{...S.toast, background:toast.ok?"#052e16":"#1f0808", border:`1px solid ${toast.ok?"#166534":"#7f1d1d"}`, color:toast.ok?"#4ade80":"#fca5a5"}}>
          {toast.ok?"✓":"✕"} {toast.msg}
        </div>
      )}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ data, activeBudget, consumed, pct, setView, setModal, hoy, gastosMesActual, pendientesAnteriores }) {

  const pagadosMes  = gastosMesActual.filter(e=>e.status==="paid");
  const pendientesMes = gastosMesActual.filter(e=>e.status==="pending");
  const totalPagadoMes  = pagadosMes.reduce((s,e)=>s+parseFloat(e.paid_amount??e.amount),0);
  const totalPendMes    = pendientesMes.reduce((s,e)=>s+parseFloat(e.amount),0);
  const totalPendAnt    = pendientesAnteriores.reduce((s,e)=>s+parseFloat(e.amount),0);

  // agrupar pendientes anteriores por mes
  const pendAntPorMes = pendientesAnteriores.reduce((acc,e)=>{
    const m = e.mes_origen||e.date?.slice(0,7);
    if(!acc[m]) acc[m]=[];
    acc[m].push(e);
    return acc;
  },{});

  const byGroup = ["Propiedades","Vehículos","Familiares"].map(g=>({
    group:g,
    total: gastosMesActual.filter(e=>e.grupo===g).reduce((s,e)=>s+parseFloat(e.paid_amount??e.amount),0),
    count: gastosMesActual.filter(e=>e.grupo===g).length,
  }));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Presupuesto del mes */}
      <div style={{...S.card,padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
          <div>
            <p style={{color:"#6b7280",fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600}}>Presupuesto — {labelMes(hoy)}</p>
            {activeBudget
              ? <p style={{color:"#e5e7eb",fontSize:34,fontWeight:800,letterSpacing:"-0.02em",marginTop:4}}>{fmt(activeBudget.total)}</p>
              : <p style={{color:"#6b7280",marginTop:8}}>Sin presupuesto para este mes</p>}
          </div>
          <button style={S.btnPrimary} onClick={()=>setModal({type:"budget"})}>
            {activeBudget?"Modificar":"+ Registrar"}
          </button>
        </div>
        {activeBudget && (
          <div style={{marginTop:18}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#6b7280",fontSize:13}}>Comprometido: {fmt(consumed)}</span>
              <span style={{color:pct>90?"#f87171":pct>70?"#fb923c":"#4ade80",fontWeight:700}}>{pct.toFixed(1)}%</span>
            </div>
            <div style={S.progressTrack}>
              <div style={{...S.progressBar,width:`${pct}%`,background:pct>90?"#f87171":pct>70?"#fb923c":"#4ade80"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,flexWrap:"wrap",gap:8}}>
              <span style={{color:"#4b5563",fontSize:12}}>Disponible: {fmt(activeBudget.total - consumed)}</span>
              {totalPendAnt > 0 && <span style={{color:"#fb923c",fontSize:12}}>⚠️ Incluye {fmt(totalPendAnt)} de meses anteriores</span>}
            </div>
          </div>
        )}
      </div>

      {/* Stats mes actual */}
      <div>
        <p style={S.sectionTitle}>Mes actual — {labelMes(hoy)}</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
          <StatCard label="Pagado"    value={fmt(totalPagadoMes)} sub={`${pagadosMes.length} gastos`}    color="#4ade80"/>
          <StatCard label="Pendiente" value={fmt(totalPendMes)}   sub={`${pendientesMes.length} gastos`} color="#fb923c"/>
          <StatCard label="Propiedades" value={data.properties.length} sub="registradas" color="#818cf8" onClick={()=>setView("properties")}/>
          <StatCard label="Vehículos"   value={data.vehicles.length}   sub="registrados" color="#f472b6" onClick={()=>setView("vehicles")}/>
        </div>
      </div>

      {/* Por grupo */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
        {byGroup.map(g=>{
          const c=GROUP_COLORS[g.group];
          return (
            <div key={g.group} style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:14,padding:"16px 14px",textAlign:"center"}}>
              <span style={{fontSize:24}}>{GROUP_ICONS[g.group]}</span>
              <p style={{color:"#d1d5db",fontWeight:600,marginTop:6,fontSize:13}}>{g.group}</p>
              <p style={{color:c.accent,fontSize:16,fontWeight:700,marginTop:4}}>{fmt(g.total)}</p>
              <p style={{color:"#4b5563",fontSize:11,marginTop:2}}>{g.count} gastos</p>
            </div>
          );
        })}
      </div>

      {/* Pendientes de meses anteriores */}
      {pendientesAnteriores.length > 0 && (
        <div>
          <p style={{...S.sectionTitle,color:"#fb923c"}}>⚠️ Pendientes de meses anteriores ({pendientesAnteriores.length})</p>
          {Object.entries(pendAntPorMes).sort((a,b)=>b[0].localeCompare(a[0])).map(([mes,gastos])=>(
            <div key={mes} style={{marginBottom:12}}>
              <p style={{color:"#6b7280",fontSize:12,marginBottom:6,fontWeight:600}}>{labelMes(mes)}</p>
              {gastos.map(e=><ExpenseRow key={e.id} expense={e} compact/>)}
            </div>
          ))}
          <button style={{...S.btnGhost,marginTop:4,fontSize:12}} onClick={()=>setView("archivo")}>Ver archivo completo →</button>
        </div>
      )}

      {/* Últimos gastos del mes */}
      {gastosMesActual.length > 0 && (
        <div style={{...S.card,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{color:"#e5e7eb",fontWeight:600}}>Últimos gastos del mes</h3>
            <button style={S.btnOutline} onClick={()=>setView("expenses")}>Ver todos</button>
          </div>
          {gastosMesActual.slice(0,5).map(e=><ExpenseRow key={e.id} expense={e} compact/>)}
        </div>
      )}
    </div>
  );
}

function StatCard({ label, value, sub, color, onClick }) {
  return (
    <div onClick={onClick} style={{...S.card,padding:"14px 18px",cursor:onClick?"pointer":"default",borderColor:color+"33"}}>
      <p style={{color:"#6b7280",fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>{label}</p>
      <p style={{color,fontSize:22,fontWeight:700,margin:"6px 0 3px"}}>{value}</p>
      <p style={{color:"#4b5563",fontSize:12}}>{sub}</p>
    </div>
  );
}

// ── Entities ──────────────────────────────────────────────────────────────────
function Entities({ type, data, reload, setModal, showToast }) {
  const items=data[type]; const isProps=type==="properties"; const label=isProps?"propiedad":"vehículo";
  const handleDelete = async id => {
    const {error}=await db.from(type).delete().eq("id",id);
    if(error){showToast("Error al eliminar",false);return;}
    await reload(type); showToast("Eliminado correctamente");
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {items.length===0 && <div style={{...S.card,padding:48,textAlign:"center"}}><span style={{fontSize:40}}>{isProps?"🏠":"🚗"}</span><p style={{color:"#6b7280",marginTop:12}}>No hay {label}s registrados</p></div>}
      {items.map(item=>(
        <div key={item.id} style={{...S.card,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div>
            <p style={{color:"#e5e7eb",fontWeight:600}}>{item.name}</p>
            {item.description&&<p style={{color:"#6b7280",fontSize:13,marginTop:2}}>{item.description}</p>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={S.btnOutline} onClick={()=>setModal({type:isProps?"property":"vehicle",item})}>Editar</button>
            <button style={S.btnDanger}  onClick={()=>handleDelete(item.id)}>Eliminar</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── ExpenseList (solo mes actual) ─────────────────────────────────────────────
function ExpenseList({ gastosMesActual, reload, setModal, showToast, hoy }) {
  const [filter, setFilter] = useState({grupo:"",status:"",search:""});
  const setF=(k,v)=>setFilter(f=>({...f,[k]:v}));

  const filtered = gastosMesActual.filter(e=>{
    if(filter.grupo  && e.grupo  !==filter.grupo)  return false;
    if(filter.status && e.status !==filter.status) return false;
    if(filter.search && !e.service.toLowerCase().includes(filter.search.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <input style={{...S.input,flex:1,minWidth:140}} placeholder="Buscar..." value={filter.search} onChange={e=>setF("search",e.target.value)}/>
        <select style={{...S.select,flex:1,minWidth:140}} value={filter.grupo} onChange={e=>setF("grupo",e.target.value)}>
          <option value="">Todos los grupos</option>
          {["Propiedades","Vehículos","Familiares"].map(g=><option key={g}>{g}</option>)}
        </select>
        <select style={{...S.select,flex:1,minWidth:140}} value={filter.status} onChange={e=>setF("status",e.target.value)}>
          <option value="">Todos los estados</option>
          <option value="pending">Pendientes</option>
          <option value="paid">Pagados</option>
        </select>
      </div>
      {filtered.length===0 && <div style={{...S.card,padding:48,textAlign:"center"}}><span style={{fontSize:40}}>📋</span><p style={{color:"#6b7280",marginTop:12}}>No hay gastos este mes</p></div>}
      {filtered.map(e=>(
        <ExpenseRow key={e.id} expense={e}
          onEdit={()=>setModal({type:"expense",item:e})}
          onPay={()=>setModal({type:"payPending",expense:e})}
          onDelete={()=>setModal({type:"deleteConfirm",expense:e})}
        />
      ))}
    </div>
  );
}

// ── Archivo ───────────────────────────────────────────────────────────────────
function Archivo({ archivados, pendientesAnteriores, reload, setModal, showToast }) {
  const [tab, setTab] = useState("pendientes");

  const items = tab==="pendientes" ? pendientesAnteriores : archivados;

  // agrupar por mes
  const porMes = items.reduce((acc,e)=>{
    const m=e.mes_origen||e.date?.slice(0,7);
    if(!acc[m]) acc[m]=[];
    acc[m].push(e);
    return acc;
  },{});

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={S.tabBar}>
        <button style={{...S.tab,background:tab==="pendientes"?"#cc0000":"transparent",color:tab==="pendientes"?"#fff":"#6b7280"}} onClick={()=>setTab("pendientes")}>
          ⚠️ Pendientes anteriores ({pendientesAnteriores.length})
        </button>
        <button style={{...S.tab,background:tab==="pagados"?"#1f2937":"transparent",color:tab==="pagados"?"#e5e7eb":"#6b7280"}} onClick={()=>setTab("pagados")}>
          📦 Pagados archivados ({archivados.length})
        </button>
      </div>

      {items.length===0 && (
        <div style={{...S.card,padding:48,textAlign:"center"}}>
          <span style={{fontSize:40}}>{tab==="pendientes"?"✅":"📦"}</span>
          <p style={{color:"#6b7280",marginTop:12}}>
            {tab==="pendientes"?"Sin pendientes de meses anteriores":"Sin gastos archivados"}
          </p>
        </div>
      )}

      {Object.entries(porMes).sort((a,b)=>b[0].localeCompare(a[0])).map(([mes,gastos])=>(
        <div key={mes}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <p style={{...S.sectionTitle,margin:0}}>{labelMes(mes)}</p>
            <p style={{color:"#6b7280",fontSize:12}}>{fmt(gastos.reduce((s,e)=>s+parseFloat(e.paid_amount??e.amount),0))}</p>
          </div>
          {gastos.map(e=>(
            <ExpenseRow key={e.id} expense={e}
              onEdit={()=>setModal({type:"expense",item:e})}
              onPay={tab==="pendientes" ? ()=>setModal({type:"payPending",expense:e}) : undefined}
              onDelete={()=>setModal({type:"deleteConfirm",expense:e})}
            />
          ))}
        </div>
      ))}
    </div>
  );
}

// ── Reports ───────────────────────────────────────────────────────────────────
function Reports({ data }) {
  const [filter, setFilter] = useState({grupo:"",status:"",from:"",to:""});
  const setF=(k,v)=>setFilter(f=>({...f,[k]:v}));

  const filtered = data.expenses.filter(e=>{
    if(filter.grupo  && e.grupo  !==filter.grupo)  return false;
    if(filter.status && e.status !==filter.status) return false;
    if(filter.from   && e.date   < filter.from)    return false;
    if(filter.to     && e.date   > filter.to)      return false;
    return true;
  });

  const total   = filtered.reduce((s,e)=>s+parseFloat(e.paid_amount??e.amount),0);
  const byGroup = filtered.reduce((a,e)=>{ a[e.grupo]=(a[e.grupo]||0)+parseFloat(e.paid_amount??e.amount); return a; },{});
  const byType  = filtered.reduce((a,e)=>{ a[e.type] =(a[e.type] ||0)+parseFloat(e.paid_amount??e.amount); return a; },{});

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{...S.card,padding:20}}>
        <p style={{color:"#e5e7eb",fontWeight:600,marginBottom:14}}>Filtros</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
          <div><label style={S.label}>Grupo</label>
            <select style={S.select} value={filter.grupo} onChange={e=>setF("grupo",e.target.value)}>
              <option value="">Todos</option>{["Propiedades","Vehículos","Familiares"].map(g=><option key={g}>{g}</option>)}
            </select></div>
          <div><label style={S.label}>Estado</label>
            <select style={S.select} value={filter.status} onChange={e=>setF("status",e.target.value)}>
              <option value="">Todos</option><option value="pending">Pendientes</option><option value="paid">Pagados</option>
            </select></div>
          <div><label style={S.label}>Desde</label><input type="date" style={S.input} value={filter.from} onChange={e=>setF("from",e.target.value)}/></div>
          <div><label style={S.label}>Hasta</label><input type="date" style={S.input} value={filter.to}   onChange={e=>setF("to",e.target.value)}/></div>
        </div>
      </div>

      <div style={{...S.card,padding:20,display:"flex",gap:24,flexWrap:"wrap"}}>
        <div style={{minWidth:140}}>
          <p style={{color:"#6b7280",fontSize:12}}>Total filtrado</p>
          <p style={{color:"#e5e7eb",fontSize:28,fontWeight:800,margin:"6px 0 2px"}}>{fmt(total)}</p>
          <p style={{color:"#4b5563",fontSize:12}}>{filtered.length} gastos</p>
        </div>
        <div style={{flex:1,minWidth:220}}>
          <p style={{color:"#6b7280",fontSize:12,marginBottom:10}}>Por grupo</p>
          {Object.entries(byGroup).map(([g,v])=>{
            const c=GROUP_COLORS[g]; const p=total?(v/total*100).toFixed(1):0;
            return (
              <div key={g} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{color:"#d1d5db",fontSize:13}}>{GROUP_ICONS[g]} {g}</span>
                  <span style={{color:c?.accent,fontSize:13,fontWeight:600}}>{fmt(v)} ({p}%)</span>
                </div>
                <div style={S.progressTrack}><div style={{...S.progressBar,width:`${p}%`,background:c?.accent}}/></div>
              </div>
            );
          })}
        </div>
      </div>

      {Object.keys(byType).length>0 && (
        <div style={{...S.card,padding:20}}>
          <p style={{color:"#e5e7eb",fontWeight:600,marginBottom:14}}>Por tipo de gasto</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
            {Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([t,v])=>(
              <div key={t} style={{background:"#1f2937",borderRadius:10,padding:"12px 14px"}}>
                <p style={{color:"#9ca3af",fontSize:12}}>{t}</p>
                <p style={{color:"#e5e7eb",fontWeight:700,marginTop:4}}>{fmt(v)}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      {filtered.length===0
        ? <div style={{...S.card,padding:48,textAlign:"center"}}><span style={{fontSize:40}}>📊</span><p style={{color:"#6b7280",marginTop:12}}>Sin resultados</p></div>
        : <div style={{...S.card,padding:20}}>
            <p style={{color:"#e5e7eb",fontWeight:600,marginBottom:14}}>Detalle ({filtered.length})</p>
            {filtered.map(e=><ExpenseRow key={e.id} expense={e} compact/>)}
          </div>
      }
    </div>
  );
}

// ── ExpenseRow ────────────────────────────────────────────────────────────────
function ExpenseRow({ expense:e, compact, onEdit, onPay, onDelete }) {
  const c = GROUP_COLORS[e.grupo] || GROUP_COLORS.Familiares;
  const mesOrigen = e.mes_origen || e.date?.slice(0,7);
  const hoy = mesActual();
  const esAnterior = mesOrigen < hoy;
  return (
    <div style={{...S.card,borderLeft:`3px solid ${c.accent}`,padding:"12px 16px",display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap",marginBottom:8}}>
      <div style={{flex:1,minWidth:180}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{color:"#e5e7eb",fontWeight:600}}>{e.service}</span>
          <span style={{...S.badge,background:c.accent+"22",color:c.accent}}>{e.type}</span>
          <span style={{...S.badge,background:e.status==="pending"?"#fb923c22":"#4ade8022",color:e.status==="pending"?"#fb923c":"#4ade80"}}>
            {e.status==="pending"?"Pendiente":"Pagado"}
          </span>
          {esAnterior && <span style={{...S.badge,background:"#78350f22",color:"#fb923c"}}>📅 {labelMes(mesOrigen)}</span>}
          {e.grupo && <span style={{...S.badge,background:"#ffffff0d",color:"#6b7280"}}>{GROUP_ICONS[e.grupo]} {e.grupo}</span>}
        </div>
        <div style={{display:"flex",gap:14,marginTop:4,flexWrap:"wrap"}}>
          <span style={{color:"#6b7280",fontSize:12}}>📅 {fmtDate(e.date)}</span>
          {e.entity_name&&<span style={{color:"#6b7280",fontSize:12}}>📍 {e.entity_name}</span>}
          {e.notes&&<span style={{color:"#4b5563",fontSize:12}}>💬 {e.notes}</span>}
        </div>
      </div>
      <div style={{textAlign:"right"}}>
        <p style={{color:c.accent,fontWeight:700,fontSize:16}}>{fmt(e.paid_amount??e.amount)}</p>
        {!compact && (
          <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}}>
            {e.status==="pending"&&<button style={S.btnSuccess} onClick={onPay}>Pagar</button>}
            <button style={S.btnOutline} onClick={onEdit}>Editar</button>
            <button style={S.btnDanger}  onClick={onDelete}>✕</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Modals ────────────────────────────────────────────────────────────────────
function Modal({ title, children, close, wide }) {
  return (
    <div style={S.overlay} onClick={ev=>{if(ev.target===ev.currentTarget)close();}}>
      <div style={{...S.modalBox,maxWidth:wide?540:440}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px",borderBottom:"1px solid #1f2937"}}>
          <h2 style={{color:"#e5e7eb",fontWeight:700,fontSize:17}}>{title}</h2>
          <button style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:18,padding:2}} onClick={close}>✕</button>
        </div>
        <div style={{padding:"20px 22px",overflowY:"auto"}}>{children}</div>
      </div>
    </div>
  );
}

function Field({ label, children, wide }) {
  return (
    <div style={{gridColumn:wide?"1 / -1":undefined}}>
      <label style={S.label}>{label}</label>
      {children}
    </div>
  );
}

function BudgetModal({ data, reload, close, showToast }) {
  const now=new Date();
  const [form,setForm]=useState({total:"",year:now.getFullYear(),month:now.getMonth()+1});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handle=async()=>{
    if(!form.total||isNaN(+form.total)) return;
    setSaving(true);
    const existing=data.budgets.find(b=>b.year===+form.year&&b.month===+form.month);
    let error;
    if(existing){({error}=await db.from("budgets").update({total:+form.total}).eq("id",existing.id));}
    else{({error}=await db.from("budgets").insert({total:+form.total,year:+form.year,month:+form.month}));}
    setSaving(false);
    if(error){showToast("Error al guardar",false);return;}
    await reload("budgets"); showToast("Presupuesto guardado ✓"); close();
  };
  return (
    <Modal title="Registrar Presupuesto" close={close}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="Importe total"><input style={S.input} type="number" min="0" value={form.total} onChange={e=>set("total",e.target.value)}/></Field>
        <Field label="Año"><input style={S.input} type="number" value={form.year} onChange={e=>set("year",e.target.value)}/></Field>
        <Field label="Mes"><select style={S.select} value={form.month} onChange={e=>set("month",+e.target.value)}>{MONTHS.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></Field>
        <button style={{...S.btnPrimary,marginTop:6}} onClick={handle} disabled={saving}>{saving?"Guardando...":"Guardar presupuesto"}</button>
      </div>
    </Modal>
  );
}

function EntityModal({ type, reload, close, showToast, item }) {
  const [form,setForm]=useState({name:item?.name||"",description:item?.description||""});
  const [saving,setSaving]=useState(false);
  const label=type==="properties"?"Propiedad":"Vehículo";
  const handle=async()=>{
    if(!form.name.trim()) return; setSaving(true);
    let error;
    if(item){({error}=await db.from(type).update(form).eq("id",item.id));}
    else{({error}=await db.from(type).insert(form));}
    setSaving(false);
    if(error){showToast("Error al guardar",false);return;}
    await reload(type); showToast(`${label} guardado ✓`); close();
  };
  return (
    <Modal title={`${item?"Editar":"Nueva"} ${label}`} close={close}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="Nombre"><input style={S.input} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
        <Field label="Descripción (opcional)"><input style={S.input} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></Field>
        <button style={{...S.btnPrimary,marginTop:6}} onClick={handle} disabled={saving}>{saving?"Guardando...":"Guardar"}</button>
      </div>
    </Modal>
  );
}

function ExpenseModal({ data, reload, close, showToast, item, hoy }) {
  const [step,setStep]=useState("form");
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({
    grupo:      item?.grupo      || "Propiedades",
    entity_id:  item?.entity_id  || "",
    entity_name:item?.entity_name|| "",
    type:       item?.type       || "",
    service:    item?.service    || "",
    amount:     item?.amount     || "",
    date:       item?.date       || today(),
    notes:      item?.notes      || "",
    status:     item?.status     || "pending",
    mes_origen: item?.mes_origen || (item?.date ? item.date.slice(0,7) : hoy),
  });
  const set=(k,v)=>setForm(f=>{const upd={...f,[k]:v}; if(k==="date") upd.mes_origen=v.slice(0,7); return upd;});
  const entities=form.grupo==="Propiedades"?data.properties:form.grupo==="Vehículos"?data.vehicles:[];

  const handleSave=async(status)=>{
    setSaving(true);
    const payload={
      grupo:       form.grupo,
      entity_id:   form.entity_id||null,
      entity_name: form.entity_name||null,
      type:        form.type,
      service:     form.service,
      amount:      parseFloat(form.amount),
      date:        form.date,
      notes:       form.notes||null,
      status,
      mes_origen:  form.mes_origen||hoy,
      paid_amount: status==="paid"?parseFloat(form.amount):null,
      paid_date:   status==="paid"?form.date:null,
    };
    let error;
    if(item){({error}=await db.from("expenses").update(payload).eq("id",item.id));}
    else{({error}=await db.from("expenses").insert(payload));}
    setSaving(false);
    if(error){showToast("Error al guardar",false);return;}
    await reload("expenses"); showToast("Gasto guardado ✓"); close();
  };

  if(step==="confirm") return (
    <Modal title="¿Cómo registrar el gasto?" close={close}>
      <p style={{color:"#9ca3af",marginBottom:8}}><strong style={{color:"#e5e7eb"}}>{form.service}</strong> — {fmt(form.amount)}</p>
      <p style={{color:"#6b7280",fontSize:14,marginBottom:24}}>¿Registrar como pendiente o pagado?</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <button style={{...S.btnWarning,padding:"14px 0"}} onClick={()=>handleSave("pending")} disabled={saving}>🕐 Dejar Pendiente</button>
        <button style={{...S.btnSuccess,padding:"14px 0"}} onClick={()=>handleSave("paid")}    disabled={saving}>✓ Registrar Pagado</button>
      </div>
      <button style={{...S.btnOutline,width:"100%",marginTop:10}} onClick={()=>setStep("form")}>← Volver</button>
    </Modal>
  );

  return (
    <Modal title={item?"Editar Gasto":"Nuevo Gasto"} close={close} wide>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Grupo" wide>
          <select style={S.select} value={form.grupo} onChange={e=>{set("grupo",e.target.value);set("entity_id","");set("entity_name","");set("type","");}}>
            {["Propiedades","Vehículos","Familiares"].map(g=><option key={g}>{g}</option>)}
          </select>
        </Field>
        {entities.length>0&&(
          <Field label={form.grupo==="Propiedades"?"Propiedad":"Vehículo"} wide>
            <select style={S.select} value={form.entity_id} onChange={e=>{const ent=entities.find(x=>x.id===e.target.value);set("entity_id",e.target.value);set("entity_name",ent?.name||"");}}>
              <option value="">Sin especificar</option>
              {entities.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </Field>
        )}
        <Field label="Tipo de gasto" wide>
          <select style={S.select} value={form.type} onChange={e=>set("type",e.target.value)}>
            <option value="">Seleccionar tipo...</option>
            {(EXPENSE_TYPES[form.grupo]||[]).map(t=><option key={t}>{t}</option>)}
          </select>
        </Field>
        <Field label="Servicio / Empresa">
          <input style={S.input} maxLength={30} value={form.service} onChange={e=>set("service",e.target.value)} placeholder="Máx. 30 caracteres"/>
        </Field>
        <Field label="Importe">
          <input style={S.input} type="number" min="0" step="0.01" value={form.amount} onChange={e=>set("amount",e.target.value)}/>
        </Field>
        <Field label="Fecha">
          <input style={S.input} type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
        </Field>
        {item&&(
          <Field label="Estado">
            <select style={S.select} value={form.status} onChange={e=>set("status",e.target.value)}>
              <option value="pending">Pendiente</option>
              <option value="paid">Pagado</option>
            </select>
          </Field>
        )}
        <Field label={`Observaciones (${form.notes.length}/140)`} wide>
          <textarea style={{...S.input,height:68,resize:"vertical"}} maxLength={140} value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Opcional..."/>
        </Field>
      </div>
      <button style={{...S.btnPrimary,width:"100%",marginTop:16}}
        onClick={()=>{if(!form.service.trim()||!form.amount)return; item?handleSave(form.status):setStep("confirm");}}
        disabled={saving}>
        {saving?"Guardando...":item?"Guardar cambios":"Continuar →"}
      </button>
    </Modal>
  );
}

function PayPendingModal({ expense, reload, close, showToast }) {
  const [form,setForm]=useState({date:today(),amount:expense.amount});
  const [saving,setSaving]=useState(false);
  const handle=async()=>{
    setSaving(true);
    const {error}=await db.from("expenses").update({status:"paid",paid_date:form.date,paid_amount:parseFloat(form.amount)}).eq("id",expense.id);
    setSaving(false);
    if(error){showToast("Error al registrar pago",false);return;}
    await reload("expenses"); showToast("Pago registrado ✓"); close();
  };
  return (
    <Modal title={`Pagar: ${expense.service}`} close={close}>
      <p style={{color:"#6b7280",fontSize:14,marginBottom:18}}>Podés modificar la fecha y el importe antes de confirmar.</p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="Fecha de pago"><input style={S.input} type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></Field>
        <Field label="Importe pagado"><input style={S.input} type="number" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></Field>
        <button style={{...S.btnSuccess,marginTop:4}} onClick={handle} disabled={saving}>{saving?"Registrando...":"✓ Confirmar pago"}</button>
      </div>
    </Modal>
  );
}

function DeleteConfirmModal({ expense, reload, close, showToast }) {
  const [saving,setSaving]=useState(false);
  const handle=async()=>{
    setSaving(true);
    const {error}=await db.from("expenses").delete().eq("id",expense.id);
    setSaving(false);
    if(error){showToast("Error al eliminar",false);return;}
    await reload("expenses"); showToast("Gasto eliminado"); close();
  };
  return (
    <Modal title="Eliminar gasto" close={close}>
      <p style={{color:"#d1d5db",marginBottom:24}}>¿Confirma que desea eliminar <strong style={{color:"#e5e7eb"}}>{expense.service}</strong> ({fmt(expense.amount)})?</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <button style={S.btnOutline} onClick={close}>Cancelar</button>
        <button style={{...S.btnDanger,padding:"10px 0"}} onClick={handle} disabled={saving}>{saving?"Eliminando...":"Eliminar"}</button>
      </div>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
